<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>Bullpen Console</title>
  <style>
    :root { color-scheme: dark; }
    body {
      font-family: system-ui, -apple-system, "Segoe UI", sans-serif;
      margin: 0;
      background: #0f1419;
      color: #e6e6e6;
      min-height: 100vh;
    }
    main { max-width: 760px; margin: 0 auto; padding: 2rem 1.5rem 4rem; }
    h1 { margin: 0 0 0.25rem; font-size: 1.6rem; }
    .tagline { margin: 0 0 1.5rem; color: #9aa7b2; }
    fieldset { border: 1px solid #243240; border-radius: 8px; padding: 1rem 1.25rem; margin: 0 0 1.25rem; }
    legend { padding: 0 0.4rem; color: #9aa7b2; font-size: 0.85rem; text-transform: uppercase; letter-spacing: 0.05em; }
    label { display: block; margin: 0 0 0.5rem; font-size: 0.95rem; }
    input[type="text"] {
      width: 100%; box-sizing: border-box; padding: 0.6rem 0.75rem;
      background: #0b0f14; border: 1px solid #243240; border-radius: 6px;
      color: #e6e6e6; font-size: 1rem;
    }
    .outputs { display: flex; flex-wrap: wrap; gap: 0.75rem; margin-top: 0.5rem; }
    .outputs label { display: inline-flex; align-items: center; gap: 0.35rem; margin: 0; color: #cdd6df; }
    button {
      padding: 0.6rem 1.4rem; font-size: 1rem; font-weight: 600;
      background: #2563eb; color: #fff; border: 0; border-radius: 6px; cursor: pointer;
    }
    button:disabled { background: #33415a; cursor: not-allowed; }
    .status { margin: 1rem 0 0; min-height: 1.2rem; color: #9aa7b2; }
    .status.error { color: #f08a8a; }
    #timeline { list-style: none; margin: 1.25rem 0 0; padding: 0; }
    #timeline li {
      padding: 0.55rem 0.75rem; margin: 0 0 0.4rem; border-radius: 6px;
      background: #131b24; border-left: 3px solid #2563eb; font-size: 0.92rem;
    }
    #timeline li .ts { color: #6b7785; font-variant-numeric: tabular-nums; margin-right: 0.5rem; }
    #timeline li .agent { color: #6db3f2; font-weight: 600; }
    #terminal {
      display: none; margin-top: 1.25rem; padding: 0.85rem 1rem;
      border-radius: 6px; background: #0e2a1a; border: 1px solid #1f5c39;
      color: #7fe0a6; font-weight: 600;
    }
    #terminal.error { background: #2a0e0e; border-color: #5c1f1f; color: #f0a0a0; }
    #terminal .terminal-detail { display: block; margin-top: 0.4rem; font-weight: 400; color: #cdd6df; }
    #terminal .terminal-step { font-weight: 600; color: #f0a0a0; }
    #escalated {
      display: none; margin-top: 1.25rem; padding: 1rem 1.25rem;
      border-radius: 8px; background: #1a1407; border: 1px solid #6b5210;
      color: #f0c674;
    }
    #escalated h2 { margin: 0 0 0.5rem; font-size: 1.1rem; color: #f0c674; }
    #escalated p { margin: 0 0 0.6rem; color: #cdd6df; }
    #escalated .escalated-files { margin: 0; padding-left: 1.1rem; color: #cdd6df; }
    #escalated .escalated-files li { margin: 0 0 0.35rem; }
    #escalated .escalated-files .reason { color: #9aa7b2; }
    #approval {
      display: none; margin-top: 1.25rem; padding: 1rem 1.25rem;
      border-radius: 8px; background: #1a1407; border: 1px solid #6b5210;
    }
    #approval h2 { margin: 0 0 0.5rem; font-size: 1.1rem; color: #f0c674; }
    #approval .pending { margin: 0 0 0.85rem; padding-left: 1.1rem; color: #cdd6df; }
    #approval .actions { display: flex; gap: 0.75rem; }
    #approve-btn { background: #1f8b4c; }
    #reject-btn { background: #b3392f; }
    code { color: #6db3f2; }
    #ideas-search { margin: 0 0 0.75rem; }
    #ideas-warning {
      display: none; margin: 0 0 0.75rem; padding: 0.6rem 0.75rem;
      border-radius: 6px; background: #1a1407; border: 1px solid #6b5210; color: #f0c674;
      font-size: 0.9rem;
    }
    #ideas-list { list-style: none; margin: 0; padding: 0; max-height: 18rem; overflow-y: auto; }
    #ideas-list li { margin: 0 0 0.4rem; }
    #ideas-list .idea {
      display: flex; justify-content: space-between; align-items: baseline; gap: 0.75rem;
      width: 100%; box-sizing: border-box; text-align: left; cursor: pointer;
      padding: 0.55rem 0.75rem; border-radius: 6px; font-weight: 400; font-size: 0.92rem;
      background: #131b24; border: 1px solid #243240; color: #e6e6e6;
    }
    #ideas-list .idea:hover, #ideas-list .idea:focus {
      background: #18222e; border-color: #2563eb; outline: none;
    }
    #ideas-list .idea .idea-topic { font-weight: 600; color: #cdd6df; }
    #ideas-list .idea .idea-meta { color: #6b7785; font-size: 0.82rem; white-space: nowrap; }
    #ideas-empty { margin: 0; color: #9aa7b2; font-size: 0.9rem; }
  </style>
</head>
<body>
  <main>
    <h1>Bullpen Console</h1>
    <p class="tagline">Start a content pipeline Run and watch it stream live.</p>

    <fieldset id="ideas-panel">
      <legend>Topic Ideas</legend>
      <label for="ideas-search">Search your vault, or pick a recent topic</label>
      <input type="text" id="ideas-search" placeholder="Search topics by title..." autocomplete="off">
      <p id="ideas-warning" role="status" aria-live="polite"></p>
      <ul id="ideas-list" aria-live="polite"></ul>
      <p id="ideas-empty"></p>
    </fieldset>

    <form id="run-form">
      <fieldset>
        <legend>New Run</legend>
        <label for="topic">Topic</label>
        <input type="text" id="topic" name="topic" placeholder="e.g. AgentCore in Sydney" autocomplete="off" required>
        <div class="outputs" id="outputs">
          <label><input type="checkbox" value="all" checked> all</label>
          <label><input type="checkbox" value="blog"> blog</label>
          <label><input type="checkbox" value="youtube"> youtube</label>
          <label><input type="checkbox" value="cfp"> cfp</label>
          <label><input type="checkbox" value="usergroup"> usergroup</label>
          <label><input type="checkbox" value="digest"> digest</label>
        </div>
      </fieldset>
      <button type="submit" id="run-btn">Run</button>
    </form>

    <p class="status" id="status" role="status" aria-live="polite"></p>

    <ul id="timeline" aria-live="polite"></ul>

    <div id="approval" role="group" aria-label="Approval gate">
      <h2>Approval needed</h2>
      <p>These files earned a publish verdict and are awaiting your decision:</p>
      <ul class="pending" id="approval-files"></ul>
      <div class="actions">
        <button type="button" id="approve-btn">Approve</button>
        <button type="button" id="reject-btn">Reject</button>
      </div>
    </div>

    <div id="escalated" role="status" aria-live="polite">
      <h2>Held for manual review</h2>
      <p>No file earned a publish verdict. These files were escalated:</p>
      <ul class="escalated-files" id="escalated-files"></ul>
    </div>

    <div id="terminal" role="status" aria-live="polite"></div>
  </main>

  <script src="/static/app.js"></script>
</body>
</html>
