<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 256 256" width="256" height="256">
  <defs>
    <filter id="bullShadow" x="-20%" y="-20%" width="150%" height="150%">
      <feDropShadow dx="6" dy="6" stdDeviation="4" flood-color="#000000" flood-opacity="0.4"/>
    </filter>
    <clipPath id="circleClip">
      <circle cx="128" cy="128" r="120"/>
    </clipPath>
  </defs>

  <!-- Blue circle background -->
  <circle cx="128" cy="128" r="120" fill="#1a4dcc"/>

  <!-- Bull silhouette in white, with drop shadow, clipped to the circle -->
  <g clip-path="url(#circleClip)">
    <g filter="url(#bullShadow)">
      <!-- Left horn -->
      <path d="M 73 105 Q 45 88, 42 55 Q 42 45, 52 48 Q 72 72, 95 100 Z" fill="#ffffff"/>
      <!-- Right horn -->
      <path d="M 183 105 Q 211 88, 214 55 Q 214 45, 204 48 Q 184 72, 161 100 Z" fill="#ffffff"/>
      <!-- Head -->
      <ellipse cx="128" cy="118" rx="54" ry="42" fill="#ffffff"/>
      <!-- Muzzle -->
      <ellipse cx="128" cy="162" rx="36" ry="32" fill="#ffffff"/>
    </g>

    <!-- Face details in blue (eyes + nostrils), no shadow -->
    <circle cx="110" cy="112" r="5" fill="#1a4dcc"/>
    <circle cx="146" cy="112" r="5" fill="#1a4dcc"/>
    <ellipse cx="118" cy="166" rx="3.5" ry="5.5" fill="#1a4dcc"/>
    <ellipse cx="138" cy="166" rx="3.5" ry="5.5" fill="#1a4dcc"/>
  </g>
</svg>
